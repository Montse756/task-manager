<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!--Formulario login-->
        <div id="form-login">
            <h1>Task Manager</h1>
            <h2>Iniciar Sesión</h2>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-password" placeholder="Contraseña">
            <button onclick="login()">Entrar</button>
            <p>¿No tienes cuenta?<a href="#" onclick="mostrarRegistro()">Registrarte</a></p>
        </div>
        
        <!--Formulario registro-->
        <div id="form-registro" style="display:none">
            <h2>Crear cuenta</h2>
            <input type="text" id="reg-nombre" placeholder="Nombre">
            <input type="email" id="reg-email" placeholder="Email">
            <input type="password" id="reg-password" placeholder="Contraseña">
            <button onclick="registro()">Crear cuenta</button>
            <p>¿Ya tienes cuenta?<a href="#" onclick="mostrarLogin()">Inicia sesión</a></p>
        </div>

        <div id="mensaje"></div>

    </div>

    <script src="app.js"></script>

</body>
</html>
